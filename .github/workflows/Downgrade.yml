name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Runs strict (allow-reresolve: false); expected RED until the upstream
    # ForwardDiff/LogExpFunctions fix releases (ForwardDiff 1.3.4, #811), then auto-greens.
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"